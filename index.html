<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6Win Stable Dashboard</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; border: 1px solid #333; }
        .timer-box { font-size: 35px; font-weight: bold; color: #FFD700; margin-top: 5px; }
        
        .ai-box { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; border: 2px solid #00c853; }
        .ai-title { color: #00c853; font-weight: bold; margin-bottom: 5px; }
        .ai-output { font-size: 20px; font-weight: bold; }
        .bet-info { margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; color: #FFD700; font-weight: bold; }

        /* Stats Section */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; font-size: 13px; color: #aaa; border-top: 1px solid #333; padding-top: 10px;}
        .stat-item { display: flex; justify-content: space-between; }

        .history-container, .results-container { background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px solid #ff9800; margin-bottom: 15px; }
        .history-table-wrapper { max-height: 300px; overflow-y: auto; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; color: #fff; }
        th { background: #333; color: #ff9800; padding: 8px; position: sticky; top: 0; }
        td { border: 1px solid #333; padding: 8px; text-align: center; }
        
        .list-item { background: #1a1a1a; padding: 8px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; font-size: 14px;}
        .num-circle { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; border: 1px solid #fff; }
        .num-green { background: #2e7d32; }
        .num-red { background: #d32f2f; }
        .num-zero { background: linear-gradient(to right, #d32f2f 50%, #7b1fa2 50%); }
        .num-five { background: linear-gradient(to right, #2e7d32 50%, #7b1fa2 50%); }
        
        .win { color: #00c853; font-weight: bold; }
        .lose { color: #ff5252; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="color: #ff5252; font-weight: bold; margin-bottom: 5px; font-size: 16px;">6lottery Wingo 30 Second</div>
        <div id="next-issue" style="font-weight: bold;">Loading...</div>
        <div class="timer-box" id="countdown">30</div>
    </div>

    <div class="ai-box">
        <div class="ai-title">AI Neural Engine ခန့်မှန်းချက်</div>
        <div id="ai-prediction" class="ai-output">---</div>
        <div class="bet-info" id="bet-plan">Stage: 1 | Bet: 1x</div>
        
        <div class="stats-container">
            <div class="stat-item">Win: <span id="win-count" class="win">0</span></div>
            <div class="stat-item">Lose: <span id="lose-count" class="lose">0</span></div>
            <div class="stat-item">Win %: <span id="win-rate">0%</span></div>
            <div class="stat-item">Lose %: <span id="lose-rate">0%</span></div>
        </div>
    </div>

    <div class="history-container">
        <div style="text-align: center; font-weight: bold; margin-bottom: 5px; color: #ff9800;">AI Prediction History</div>
        <div class="history-table-wrapper">
            <table>
                <thead><tr><th>Period</th><th>Pred</th><th>Result</th><th>Status</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <div class="results-container">
        <div style="text-align: center; font-weight: bold; margin-bottom: 5px; color: #ff9800;">Live Results</div>
        <div id="results-list"></div>
    </div>
</div>

<script>
    const MY_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpYXQiOiIxNzgxMzA0NjkyIiwibmJmIjoiMTc4MTMwNDY5MiIsImV4cCI6IjE3ODEzMDY0OTIiLCJodHRwOi8vc2NoZW1hcy5taWNyb3NvZnQuY29tL3dzLzIwMDgvMDYvaWRlbnRpdHkvY2xhaW1zL2V4cGlyYXRpb24iOiI2LzEzLzIwMjYgNTo1MTozMiBBTSIsImh0dHA6Ly9zY2hlbWFzLm1pY3Jvc29mdC5jb20vd3MvMjAwOC8wNi9pZGVudGl0eS9jbGFpbXMvcm9sZSI6IkFjY2Vzc19Ub2tlbiIsIlVzZXJJZCI6IjEwNzg0OTMyIiwiVXNlck5hbWUiOiI5NTk2OTMyMjM2NzMiLCJVc2VyUGhvdG8iOiIxIiwiTmlja05hbWUiOiJNZW1iZXJOTkdSQzhERiIsIkFtb3VudCI6IjYwLjI5IiwiSW50ZWdyYWwiOiIwIiwiTG9naW5NYXJrIjoiSFMiLCJMb2dpblRpbWUiOiI2LzEzLzIwMjYgNToyMTozMiBBTSIsIkxvZ2luSVBBZGRyZXNzIjoiNzQuNTAuMjE1LjQyIiwiRGJOdW1iZXIiOiIwIiwiSXN2YWxpZGF0b3IiOiIwIiwiS2V5Q29kZSI6IjQyNiIsIlRva2VuVHlwZSI6IkFjY2Vzc19Ub2tlbiIsIlBob25lVHlwZSI6IjEiLCJVc2VyVHlwZSI6IjAiLCJVc2VyTmFtZTIiLCJpc3MiOiJqd3RJc3N1ZXIiLCJhdWQiOiJsb3R0ZXJ5VGlja2V0In0.Z2M5zAlgPntyeDb5oVVdlSIzGRjLuzndxauTYyI6r-Y";
    
    const sound1 = new Audio('https://6winak3.com/assets/mp3/di1-BcK6vZoZ.mp3');
    const sound2 = new Audio('https://6winak3.com/assets/mp3/di2-DpfFojGs.mp3');

    let currentLevel = 1;
    let lastPrediction = null;
    let lastIssue = null;
    
    // sessionStorage ကို ပြောင်းသုံးထားပါတယ်
    let historyLog = JSON.parse(sessionStorage.getItem('historyLog')) || [];

    function getNumClass(n) {
        if (n === 0) return 'num-zero';
        if (n === 5) return 'num-five';
        if ([1, 3, 7, 9].includes(n)) return 'num-green';
        if ([2, 4, 6, 8].includes(n)) return 'num-red';
        return '';
    }

    function updateStats() {
        const total = historyLog.length;
        const wins = historyLog.filter(h => h.status === 'Win').length;
        const loses = historyLog.filter(h => h.status === 'Lose').length;
        
        document.getElementById('win-count').innerText = wins;
        document.getElementById('lose-count').innerText = loses;
        document.getElementById('win-rate').innerText = total > 0 ? ((wins / total) * 100).toFixed(0) + '%' : '0%';
        document.getElementById('lose-rate').innerText = total > 0 ? ((loses / total) * 100).toFixed(0) + '%' : '0%';
    }

    async function fetchLottery() {
        try {
            const response = await fetch('https://6lotteryapi.com/api/webapi/GetNoaverageEmerdList', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + MY_TOKEN },
                body: JSON.stringify({ "pageSize": 10, "pageNo": 1, "typeId": 30, "language": 7, "random": "d002031646e54e158392dac240532dc9", "signature": "5B7CD588CE8BDB72FD974268B84E378F", "timestamp": 1781225240 })
            });
            const json = await response.json();
            if (json.data && json.data.list) {
                const list = json.data.list;
                const latest = list[0];
                const currentIssue = latest.issueNumber;
                
                if (lastIssue && lastIssue !== currentIssue && lastPrediction) {
                    const actualNum = parseInt(latest.number);
                    const actualResult = (actualNum >= 5) ? "BIG" : "SMALL";
                    const isWin = (actualResult === lastPrediction);
                    
                    if (isWin) currentLevel = 1; else currentLevel++;
                    
                    historyLog.unshift({ issue: currentIssue, pred: lastPrediction, res: actualResult, status: isWin ? "Win" : "Lose" });
                    
                    // sessionStorage မှာ သိမ်းမယ်
                    sessionStorage.setItem('historyLog', JSON.stringify(historyLog));
                    
                    updateHistoryTable();
                    updateStats();
                }
                lastIssue = currentIssue;

                document.getElementById('results-list').innerHTML = list.map(item => {
                    const num = parseInt(item.number);
                    return `<div class="list-item"><div>${item.issueNumber}</div><div class="num-circle ${getNumClass(num)}">${num}</div><div>${(num >= 5) ? "အကြီး" : "အသေး"}</div></div>`;
                }).join('');

                document.getElementById('next-issue').innerText = "Next Period: " + (BigInt(currentIssue) + 1n).toString();
                const sequence = list.map(i => (parseInt(i.number) >= 5 ? "BIG" : "SMALL"));
                const probBig = sequence.slice(0, 5).filter(x => x === "BIG").length / 5;
                lastPrediction = (probBig > 0.5) ? "BIG" : "SMALL";
                
                document.getElementById('ai-prediction').innerText = (lastPrediction === "BIG") ? "အကြီး" : "အသေး";
                document.getElementById('bet-plan').innerText = `Stage: ${currentLevel} | Bet: ${Math.pow(3, currentLevel - 1)}x`;
            }
        } catch(e) {}
    }

    function updateHistoryTable() {
        document.getElementById('history-body').innerHTML = historyLog.map(h => `
            <tr><td>${h.issue.slice(-3)}</td><td>${h.pred === "BIG" ? "အကြီး" : "အသေး"}</td><td>${h.res === "BIG" ? "အကြီး" : "အသေး"}</td><td class="${h.status === 'Win' ? 'win' : 'lose'}">${h.status}</td></tr>
        `).join('');
    }

    updateHistoryTable();
    updateStats();

    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") fetchLottery(); });
    setInterval(() => {
        const sec = new Date().getSeconds();
        const remaining = 30 - (sec % 30);
        document.getElementById('countdown').innerText = remaining;
        if (remaining >= 1 && remaining <= 5) { sound1.currentTime = 0; sound1.play().catch(()=>{}); }
        else if (remaining === 30) { sound2.currentTime = 0; sound2.play().catch(()=>{}); }
        if(sec % 30 === 0) fetchLottery();
    }, 1000);
    
    fetchLottery();
</script>
</body>
    </html>
